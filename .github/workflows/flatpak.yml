name: Build Flatpak

on:
  push:
    branches: [main]
    tags:
      - 'v*'
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build-binary:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.0-dev

      - name: Install Wails
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

      - name: Build
        working-directory: gui/czmanager
        run: wails build -platform linux/amd64

      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: linux-binary
          path: gui/czmanager/build/bin/cz-agent-gui

  flatpak:
    needs: build-binary
    runs-on: ubuntu-latest
    container:
      image: bilelmoussaoui/flatpak-github-actions:gnome-46
      options: --privileged

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download binary
        uses: actions/download-artifact@v4
        with:
          name: linux-binary
          path: flatpak/

      - name: Make binary executable
        run: chmod +x flatpak/cz-agent-gui

      - name: Build Flatpak
        uses: flatpak/flatpak-github-actions/flatpak-builder@v6
        with:
          manifest-path: flatpak/net.lokalizace.CZManager.yml
          bundle: CZManager.flatpak
          cache-key: flatpak-builder-${{ github.sha }}

      - name: Upload Flatpak bundle
        uses: actions/upload-artifact@v4
        with:
          name: CZManager-flatpak
          path: CZManager.flatpak

  release-flatpak:
    needs: flatpak
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write

    steps:
      - name: Download Flatpak bundle
        uses: actions/download-artifact@v4
        with:
          name: CZManager-flatpak

      - name: Add to Release
        uses: softprops/action-gh-release@v1
        with:
          files: CZManager.flatpak
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
