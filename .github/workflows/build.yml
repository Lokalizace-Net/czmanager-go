name: Build CZ Agent GUI

on:
  push:
    branches: [main]
    tags:
      - 'v*'
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: windows-latest
            platform: windows/amd64
            output: cz-agent-gui-windows-amd64.exe
          - os: ubuntu-latest
            platform: linux/amd64
            output: cz-agent-gui-linux-amd64
          - os: ubuntu-24.04-arm
            platform: linux/arm64
            output: cz-agent-gui-linux-arm64
          - os: macos-latest
            platform: darwin/amd64
            output: cz-agent-gui-macos-amd64
          - os: macos-latest
            platform: darwin/arm64
            output: cz-agent-gui-macos-arm64

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # Linux dependencies
      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev

      # Install Wails
      - name: Install Wails
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

      # Build
      - name: Build
        working-directory: gui/czmanager
        run: wails build -platform ${{ matrix.platform }}

      # Rename output
      - name: Rename output (Windows)
        if: runner.os == 'Windows'
        working-directory: gui/czmanager
        run: move build\bin\cz-agent-gui.exe build\bin\${{ matrix.output }}

      - name: Rename output (Unix)
        if: runner.os != 'Windows'
        working-directory: gui/czmanager
        run: mv build/bin/cz-agent-gui* build/bin/${{ matrix.output }}

      # Upload artifact
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.output }}
          path: gui/czmanager/build/bin/${{ matrix.output }}

  # Create release when tag is pushed
  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: artifacts/**/*
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
