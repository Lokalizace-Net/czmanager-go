name: Build & Release

on:
  push:
    branches: [main]
    tags:
      - 'v*'
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: windows-latest
            platform: windows/amd64
            output: cz-agent-gui-windows-amd64.exe
          - os: ubuntu-22.04
            platform: linux/amd64
            output: cz-agent-gui-linux-amd64
          - os: ubuntu-22.04-arm
            platform: linux/arm64
            output: cz-agent-gui-linux-arm64
          - os: macos-latest
            platform: darwin/amd64
            output: cz-agent-gui-macos-amd64
          - os: macos-latest
            platform: darwin/arm64
            output: cz-agent-gui-macos-arm64

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.0-dev

      - name: Install Wails
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

      - name: Build
        working-directory: gui/czmanager
        run: wails build -platform ${{ matrix.platform }}

      - name: Rename output (Windows)
        if: runner.os == 'Windows'
        working-directory: gui/czmanager
        run: move build\bin\cz-agent-gui.exe build\bin\${{ matrix.output }}

      - name: Rename output (Linux)
        if: runner.os == 'Linux'
        working-directory: gui/czmanager
        run: mv build/bin/cz-agent-gui build/bin/${{ matrix.output }}

      - name: Package macOS app
        if: runner.os == 'macOS'
        working-directory: gui/czmanager
        run: |
          cd build/bin
          zip -r ${{ matrix.output }}.zip *.app

      - name: Upload artifact (Windows/Linux)
        if: runner.os != 'macOS'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.output }}
          path: gui/czmanager/build/bin/${{ matrix.output }}

      - name: Upload artifact (macOS)
        if: runner.os == 'macOS'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.output }}
          path: gui/czmanager/build/bin/${{ matrix.output }}.zip

  flatpak:
    needs: build
    runs-on: ubuntu-latest
    container:
      image: bilelmoussaoui/flatpak-github-actions:gnome-46
      options: --privileged

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download Linux AMD64 binary
        uses: actions/download-artifact@v4
        with:
          name: cz-agent-gui-linux-amd64
          path: flatpak/

      - name: Prepare binary
        run: |
          mv flatpak/cz-agent-gui-linux-amd64 flatpak/cz-agent-gui
          chmod +x flatpak/cz-agent-gui

      - name: Build Flatpak
        uses: flatpak/flatpak-github-actions/flatpak-builder@v6
        with:
          manifest-path: flatpak/net.lokalizace.CZManager.yml
          bundle: CZManager.flatpak
          cache-key: flatpak-builder-${{ github.sha }}

      - name: Upload Flatpak bundle
        uses: actions/upload-artifact@v4
        with:
          name: CZManager-flatpak
          path: CZManager.flatpak

  release:
    needs: [build, flatpak]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: false

      - name: Flatten artifacts
        run: |
          mkdir -p release
          find artifacts -type f \( -name "*.exe" -o -name "*.zip" -o -name "*.flatpak" -o -name "cz-agent-gui-linux-*" \) -exec cp {} release/ \;
          echo "Release files:"
          ls -la release/

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: release/*
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  update-flathub-manifest:
    needs: release
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Download Linux binary artifact
        uses: actions/download-artifact@v4
        with:
          name: cz-agent-gui-linux-amd64
          path: /tmp/

      - name: Upload binary to lokalizace.net
        run: |
          curl -X PUT \
            -H "Authorization: Bearer ${{ secrets.LOKALIZACE_DEPLOY_TOKEN }}" \
            -F "file=@/tmp/cz-agent-gui-linux-amd64" \
            "https://app.lokalizace.net/czagentgui/cz-agent-gui-linux-amd64" \
            || echo "Upload to lokalizace.net failed - upload manually"

      - name: Update Flathub manifest
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          BINARY="/tmp/cz-agent-gui-linux-amd64"
          SHA256=$(sha256sum "$BINARY" | cut -d' ' -f1)
          SIZE=$(stat -c%s "$BINARY")
          URL="https://app.lokalizace.net/czagentgui/cz-agent-gui-linux-amd64"

          echo "Version: $VERSION"
          echo "SHA256: $SHA256"
          echo "Size: $SIZE"
          echo "URL: $URL"

          MANIFEST="flatpak/flathub/net.lokalizace.CZManager.yml"
          sed -i "s|sha256: .*|sha256: ${SHA256}|" "$MANIFEST"
          sed -i "s|size: .*|size: ${SIZE}|" "$MANIFEST"

          echo "Updated manifest:"
          grep -A3 "extra-data" "$MANIFEST"

      - name: Commit updated manifest
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add flatpak/flathub/net.lokalizace.CZManager.yml
          git commit -m "Update Flathub manifest for ${GITHUB_REF_NAME}" || echo "No changes"
          git push origin main
