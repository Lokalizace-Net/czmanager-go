name: Build & Release

on:
  push:
    tags:
      - 'v*'          # release.bat pushne tag vX.Y.Z -> spustí build & release
  workflow_dispatch:  # ruční spuštění tlačítkem v záložce Actions

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: windows-latest
            platform: windows/amd64
            output: cz-agent-gui-windows-amd64.exe
          # Linux - jeden AppImage na architekturu (nese webkit uvnitř, běží
          # na starých i moderních distrech). Base Ubuntu 22.04 = webkit 4.0,
          # AppImage z staršího systému běží i na novějších.
          - os: ubuntu-22.04
            platform: linux/amd64
            appimage: cz-agent-gui-linux-x86_64.AppImage
            arch: x86_64
          - os: ubuntu-22.04-arm
            platform: linux/arm64
            appimage: cz-agent-gui-linux-aarch64.AppImage
            arch: aarch64
          - os: macos-latest
            platform: darwin/amd64
            output: cz-agent-gui-macos-amd64
          - os: macos-latest
            platform: darwin/arm64
            output: cz-agent-gui-macos-arm64

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.0-dev file fuse libfuse2

      - name: Install Wails
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

      - name: Determine version
        id: version
        shell: bash
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            echo "version=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          else
            echo "version=dev-${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"
          fi

      - name: Build
        run: wails build -platform ${{ matrix.platform }} -ldflags "-X main.Version=${{ steps.version.outputs.version }}"

      - name: Rename output (Windows)
        if: runner.os == 'Windows'
        run: move build\bin\cz-agent-gui.exe build\bin\${{ matrix.output }}

      - name: Package Linux AppImage
        if: runner.os == 'Linux'
        run: |
          set -e
          ARCH=${{ matrix.arch }}

          # Připrav AppDir strukturu
          APPDIR=AppDir
          mkdir -p "$APPDIR/usr/bin" "$APPDIR/usr/share/applications" "$APPDIR/usr/share/icons/hicolor/256x256/apps"
          cp build/bin/cz-agent-gui "$APPDIR/usr/bin/cz-agent-gui"
          chmod +x "$APPDIR/usr/bin/cz-agent-gui"
          cp build/appicon.png "$APPDIR/usr/share/icons/hicolor/256x256/apps/czmanager.png"
          cp build/appicon.png "$APPDIR/czmanager.png"

          # .desktop soubor
          cat > "$APPDIR/usr/share/applications/czmanager.desktop" <<EOF
          [Desktop Entry]
          Type=Application
          Name=CZManager
          Exec=cz-agent-gui
          Icon=czmanager
          Categories=Utility;
          Terminal=false
          EOF
          cp "$APPDIR/usr/share/applications/czmanager.desktop" "$APPDIR/czmanager.desktop"

          # AppRun (vstupní bod AppImage) - nastaví i WebKit fixy pro Linux
          cat > "$APPDIR/AppRun" <<'EOF'
          #!/bin/bash
          HERE="$(dirname "$(readlink -f "${0}")")"
          export WEBKIT_DISABLE_DMABUF_RENDERER=1
          export WEBKIT_DISABLE_COMPOSITING_MODE=1
          export LD_LIBRARY_PATH="${HERE}/usr/lib:${LD_LIBRARY_PATH}"
          exec "${HERE}/usr/bin/cz-agent-gui" "$@"
          EOF
          chmod +x "$APPDIR/AppRun"

          # Stáhni linuxdeploy (AppImage) + GTK plugin. Plugin musí být v PATH
          # pojmenovaný přesně "linuxdeploy-plugin-gtk" (bez .sh), aby ho
          # linuxdeploy s --plugin gtk našel.
          wget "https://github.com/linuxdeploy/linuxdeploy/releases/download/continuous/linuxdeploy-${ARCH}.AppImage" -O linuxdeploy
          wget "https://raw.githubusercontent.com/linuxdeploy/linuxdeploy-plugin-gtk/master/linuxdeploy-plugin-gtk.sh" -O linuxdeploy-plugin-gtk
          chmod +x linuxdeploy linuxdeploy-plugin-gtk

          # AppImage nejde spustit přes FUSE v CI - extrahuj a spusť z rozbaleného
          ./linuxdeploy --appimage-extract >/dev/null
          export PATH="$PWD:$PATH"

          # Sestav AppImage (GTK plugin dotáhne webkit2gtk + závislosti)
          export OUTPUT=${{ matrix.appimage }}
          ./squashfs-root/AppRun \
            --appdir "$APPDIR" \
            --plugin gtk \
            --output appimage
          mv *.AppImage build/bin/${{ matrix.appimage }}

      - name: Package macOS app
        if: runner.os == 'macOS'
        run: |
          cd build/bin
          zip -r ${{ matrix.output }}.zip *.app

      - name: Upload artifact (Windows)
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.output }}
          path: build/bin/${{ matrix.output }}

      - name: Upload artifact (Linux AppImage)
        if: runner.os == 'Linux'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.appimage }}
          path: build/bin/${{ matrix.appimage }}

      - name: Upload artifact (macOS)
        if: runner.os == 'macOS'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.output }}
          path: build/bin/${{ matrix.output }}.zip

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: false

      - name: Flatten artifacts
        run: |
          mkdir -p release
          find artifacts -type f \( -name "*.exe" -o -name "*.zip" -o -name "*.AppImage" \) -exec cp {} release/ \;
          echo "Release files:"
          ls -la release/

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: release/*
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
