app-id: net.lokalizace.CZManager
runtime: org.gnome.Platform
runtime-version: '46'
sdk: org.gnome.Sdk
command: cz-agent-gui

finish-args:
  # Display
  - --share=ipc
  - --socket=fallback-x11
  - --socket=wayland
  - --device=dri

  # Network (API komunikace s lokalizace.net + lokální agent)
  - --share=network

  # Přístup k herním souborům pro instalaci lokalizací
  - --filesystem=home
  - --filesystem=/media:ro
  - --filesystem=/run/media:ro
  - --filesystem=/mnt:ro

  # Steam a další herní platformy
  - --filesystem=~/.steam:rw
  - --filesystem=~/.local/share/Steam:rw

  # XDG portály pro dialogy
  - --talk-name=org.freedesktop.portal.FileChooser

modules:
  - name: czmanager
    buildsystem: simple
    build-commands:
      - install -Dm755 apply_extra /app/bin/apply_extra
      - install -Dm755 cz-agent-gui-wrapper /app/bin/cz-agent-gui
      - install -Dm644 net.lokalizace.CZManager.desktop /app/share/applications/net.lokalizace.CZManager.desktop
      - install -Dm644 net.lokalizace.CZManager.metainfo.xml /app/share/metainfo/net.lokalizace.CZManager.metainfo.xml
      - install -Dm644 icon-256.png /app/share/icons/hicolor/256x256/apps/net.lokalizace.CZManager.png
    sources:
      - type: script
        dest-filename: apply_extra
        commands:
          - chmod +x cz-agent-gui

      - type: script
        dest-filename: cz-agent-gui-wrapper
        commands:
          - exec /app/extra/cz-agent-gui "$@"

      - type: file
        path: net.lokalizace.CZManager.desktop

      - type: file
        path: net.lokalizace.CZManager.metainfo.xml

      - type: file
        path: icon-256.png

      # Binary stažená při instalaci (extra-data)
      - type: extra-data
        filename: cz-agent-gui
        url: https://app.lokalizace.net/czagentgui/cz-agent-gui-linux-amd64
        sha256: FILL_SHA256_HERE
        size: FILL_SIZE_HERE
